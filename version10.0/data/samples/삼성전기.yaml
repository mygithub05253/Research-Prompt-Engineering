    제목: "Point 3. 멀티플 디스카운트 해소"
    설명: "글로벌 피어 평균 Forward PER 24x (村田 26x, TDK 22x, KEMET 25x) 대비 삼성전기 18x로 -25% 디스카운트. 1Q25 OPM 14.2% 서프라이즈(컨센서스 12.5%, +1.7%p)로 디스카운트 축소 진행 중. AI 서버 MLCC 점유율 입증 + 카메라 모듈 ASP 상승 가시화 시 Forward PER 21x 부여 적정. 목표주가 195,000원 = FY26E EPS 9,300원 × 21x."

