# GIC v13 리서치 에이전트 - 무료 자동 실행 (GitHub Actions)
#
# 매주 정해진 시각에 watchlist의 모든 기업 리서치 초안을 자동 생성하고
# (메일 설정이 있으면) 결과를 메일로 발송한다.
#
# 필요한 GitHub Secrets (레포 Settings > Secrets and variables > Actions):
#   OPENDART_API_KEY   : 무료 OpenDART API 키 (필수)
#   GIC_SMTP_USER      : 보내는 Gmail 주소 (메일 발송 시)
#   GIC_SMTP_PASSWORD  : Gmail 앱 비밀번호 16자리 (메일 발송 시)
#   GIC_MAIL_TO        : 받는 사람, 쉼표 구분 (메일 발송 시)
#
# 공개 레포의 GitHub Actions는 무료입니다. Secrets는 로그에 노출되지 않습니다.

name: GIC v13 Research Agent

on:
  schedule:
    # KST 월요일 오전 8시 = UTC 일요일 23시 (cron은 UTC 기준)
    - cron: "0 23 * * 0"
  workflow_dispatch: {}  # 수동 실행 버튼

jobs:
  research:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: version13.0
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: python -m pip install -e .

      - name: 에이전트 실행 (watchlist 일괄 + 메일)
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          GIC_SMTP_USER: ${{ secrets.GIC_SMTP_USER }}
          GIC_SMTP_PASSWORD: ${{ secrets.GIC_SMTP_PASSWORD }}
          GIC_MAIL_TO: ${{ secrets.GIC_MAIL_TO }}
        run: python -m gic_v13.cli agent run examples/watchlist.yaml --output-dir outputs --email

      - name: 산출물 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gic-research-outputs
          path: version13.0/outputs/**
          retention-days: 14
